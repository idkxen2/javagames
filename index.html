<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Optimized for iPhone 11: prevents zooming, fits the notch/safe areas, and locks scale -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>mcraft.fun</title>
    <style>
        /* Reset all margins and padding */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Ensure the body and html take up the full screen without scrolling */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* Black background while loading */
            -webkit-tap-highlight-color: transparent; /* Removes tap highlight on iOS */
        }

        /* Make the iframe fill the entire screen */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- The iframe pointing to mcraft.fun -->
    <!-- Added 'allow' attributes just in case the site requires fullscreen, audio, or other permissions -->
    <iframe 
        src="https://mcraft.fun" 
        allow="fullscreen; autoplay; microphone; camera" 
        allowfullscreen>
    </iframe>

</body>
</html>
